<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceWatch — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a14;
    --bg2: #111122;
    --bg3: #1a1a2e;
    --border: #1e1e35;
    --accent: #00e5a0;
    --accent2: #0070f3;
    --warn: #ff6b6b;
    --text: #e0e0e0;
    --muted: #555;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.01);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text h1 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo-text span {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge {
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--accent);
  }

  .badge.warn {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.3);
    color: var(--warn);
  }

  .last-update {
    font-size: 11px;
    color: var(--muted);
  }

  /* LAYOUT */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* STATS ROW */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .stat-card:hover::before { opacity: 1; }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    color: #fff;
  }

  .stat-value.green { color: var(--accent); }
  .stat-value.red { color: var(--warn); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 14px 16px; }
    .container { padding: 20px 16px; }
  }

  /* PRODUCT LIST */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .product-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }

  .product-item:last-child { border-bottom: none; }
  .product-item:hover { background: var(--bg3); }
  .product-item.active { background: var(--bg3); }

  .product-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .product-name {
    font-size: 13px;
    font-weight: 500;
    color: #ddd;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .product-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .product-store {
    font-size: 11px;
    color: var(--muted);
  }

  .product-price {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }

  .product-price.below { color: var(--accent); }

  .alert-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    position: absolute;
    top: 14px; right: 16px;
  }

  /* CHART PANEL */
  .chart-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .chart-header {
    margin-bottom: 20px;
  }

  .chart-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
  }

  .chart-subtitle {
    font-size: 11px;
    color: var(--muted);
  }

  .chart-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .chart-stat {
    background: var(--bg3);
    border-radius: 10px;
    padding: 14px;
  }

  .chart-stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .chart-stat-value {
    font-size: 18px;
    font-weight: 700;
  }

  .chart-wrap {
    position: relative;
    height: 250px;
  }

  /* EMPTY STATE */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--muted);
    text-align: center;
    gap: 12px;
  }

  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-text { font-size: 13px; line-height: 1.6; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    color: var(--muted);
    font-size: 13px;
    gap: 10px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: 40px;
  }

  .trend-up { color: var(--warn); }
  .trend-down { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div class="logo-text">
      <h1>PriceWatch</h1>
      <span>seguimiento de precios</span>
    </div>
  </div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">Cargando...</span>
    <span class="badge" id="alertBadge" style="display:none"></span>
  </div>
</header>

<div class="container">
  <div class="stats" id="statsRow">
    <div class="stat-card">
      <div class="stat-label">Productos rastreados</div>
      <div class="stat-value" id="statProducts">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Precio más bajo hoy</div>
      <div class="stat-value green" id="statLowest">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Alertas activas</div>
      <div class="stat-value" id="statAlerts">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Registros totales</div>
      <div class="stat-value" id="statRecords">—</div>
    </div>
  </div>

  <div class="grid">
    <!-- Product list -->
    <div class="panel">
      <div class="panel-header">Productos</div>
      <div id="productList">
        <div class="loading"><div class="spinner"></div> Cargando productos...</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-panel" id="chartPanel">
      <div class="empty">
        <div class="empty-icon">📈</div>
        <div class="empty-text">Selecciona un producto<br>para ver su histórico de precios</div>
      </div>
    </div>
  </div>
</div>

<footer>
  <span id="footerProducts">—</span>
  <span>PriceWatch · GitHub Pages</span>
</footer>

<script>
// ── CONFIGURACIÓN ─────────────────────────────
// Cambia esto por tu usuario y repositorio de GitHub
const GITHUB_USER = 'goku-cell-svg';
const GITHUB_REPO = 'pricewatch';
const CSV_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/precios.csv`;

// ── ESTADO ────────────────────────────────────
let allData = [];
let products = {};
let selectedProduct = null;
let chart = null;

// ── CARGAR DATOS ──────────────────────────────
async function loadData() {
  try {
    const res = await fetch(CSV_URL + '?t=' + Date.now());
    const text = await res.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
    allData = parsed.data;
    processData();
  } catch (e) {
    document.getElementById('productList').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">No se pudieron cargar los datos.<br>Asegúrate de haber configurado tu usuario de GitHub en el archivo.</div></div>`;
  }
}

function processData() {
  products = {};
  allData.forEach(row => {
    if (!row.nombre) return;
    if (!products[row.nombre]) {
      products[row.nombre] = {
        name: row.nombre,
        store: row.tienda,
        target: parseFloat(row.objetivo) || 0,
        url: row.url,
        history: [],
      };
    }
    if (row.precio) {
      products[row.nombre].history.push({
        date: row.fecha,
        price: parseFloat(row.precio),
      });
    }
  });

  // Calcular stats de cada producto
  Object.values(products).forEach(p => {
    p.history.sort((a, b) => a.date.localeCompare(b.date));
    p.current = p.history.length ? p.history[p.history.length - 1].price : null;
    p.lowest = p.history.length ? Math.min(...p.history.map(h => h.price)) : null;
    p.highest = p.history.length ? Math.max(...p.history.map(h => h.price)) : null;
    p.belowTarget = p.current && p.target && p.current <= p.target;
  });

  renderStats();
  renderProductList();

  // Seleccionar el primero automáticamente
  const first = Object.values(products)[0];
  if (first) selectProduct(first.name);
}

// ── STATS GLOBALES ────────────────────────────
function renderStats() {
  const list = Object.values(products);
  const alerts = list.filter(p => p.belowTarget).length;
  const allPrices = list.filter(p => p.current).map(p => p.current);
  const lowest = allPrices.length ? Math.min(...allPrices) : null;

  // Última actualización
  const dates = allData.map(r => r.fecha).filter(Boolean).sort();
  const lastDate = dates[dates.length - 1] || '—';
  document.getElementById('lastUpdate').textContent = `Actualizado: ${lastDate}`;

  document.getElementById('statProducts').textContent = list.length;
  document.getElementById('statLowest').textContent = lowest ? `${lowest.toFixed(2)}€` : '—';
  document.getElementById('statAlerts').textContent = alerts;
  document.getElementById('statAlerts').className = `stat-value ${alerts > 0 ? 'green' : ''}`;
  document.getElementById('statRecords').textContent = allData.length;
  document.getElementById('footerProducts').textContent = `${list.length} productos · ${allData.length} registros`;

  if (alerts > 0) {
    const badge = document.getElementById('alertBadge');
    badge.textContent = `● ${alerts} alerta${alerts > 1 ? 's' : ''}`;
    badge.style.display = 'inline';
  }
}

// ── LISTA DE PRODUCTOS ────────────────────────
function renderProductList() {
  const list = Object.values(products);
  if (!list.length) {
    document.getElementById('productList').innerHTML =
      `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Sin productos todavía</div></div>`;
    return;
  }

  document.getElementById('productList').innerHTML = list.map(p => `
    <div class="product-item ${selectedProduct === p.name ? 'active' : ''}" onclick="selectProduct('${p.name.replace(/'/g, "\\'")}')">
      ${p.belowTarget ? '<div class="alert-dot"></div>' : ''}
      <div class="product-name">${p.name}</div>
      <div class="product-meta">
        <span class="product-store">${p.store}</span>
        <span class="product-price ${p.belowTarget ? 'below' : ''}">
          ${p.current ? p.current.toFixed(2) + '€' : '—'}
        </span>
      </div>
    </div>
  `).join('');
}

// ── CHART ─────────────────────────────────────
function selectProduct(name) {
  selectedProduct = name;
  renderProductList();

  const p = products[name];
  if (!p) return;

  const prev = p.history.length > 1 ? p.history[p.history.length - 2].price : p.current;
  const diff = p.current && prev ? p.current - prev : 0;
  const trendIcon = diff < -0.01 ? '▼' : diff > 0.01 ? '▲' : '→';
  const trendClass = diff < -0.01 ? 'trend-down' : diff > 0.01 ? 'trend-up' : '';

  document.getElementById('chartPanel').innerHTML = `
    <div class="chart-header">
      <div class="chart-title">${p.name}</div>
      <div class="chart-subtitle">🏪 ${p.store}</div>
    </div>
    <div class="chart-stats">
      <div class="chart-stat">
        <div class="chart-stat-label">Precio actual</div>
        <div class="chart-stat-value" style="color:${p.belowTarget ? 'var(--accent)' : '#fff'}">
          ${p.current ? p.current.toFixed(2) + '€' : '—'}
          <span class="${trendClass}" style="font-size:13px"> ${trendIcon}</span>
        </div>
      </div>
      <div class="chart-stat">
        <div class="chart-stat-label">Mínimo histórico</div>
        <div class="chart-stat-value" style="color:var(--accent)">${p.lowest ? p.lowest.toFixed(2) + '€' : '—'}</div>
      </div>
      <div class="chart-stat">
        <div class="chart-stat-label">Precio objetivo</div>
        <div class="chart-stat-value" style="color:var(--accent2)">${p.target ? p.target.toFixed(2) + '€' : '—'}</div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="priceChart"></canvas>
    </div>
  `;

  if (p.history.length < 2) {
    document.querySelector('.chart-wrap').innerHTML =
      `<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Aún no hay suficiente historial.<br>El gráfico aparecerá tras varios días de escaneo.</div></div>`;
    return;
  }

  const ctx = document.getElementById('priceChart').getContext('2d');
  if (chart) chart.destroy();

  const labels = p.history.map(h => h.date.substring(0, 10));
  const prices = p.history.map(h => h.price);

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Precio',
        data: prices,
        borderColor: '#00e5a0',
        backgroundColor: 'rgba(0,229,160,0.06)',
        borderWidth: 2,
        pointBackgroundColor: '#00e5a0',
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a2e',
          borderColor: '#333',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#00e5a0',
          bodyFont: { family: 'DM Mono', weight: '700', size: 14 },
          callbacks: {
            label: ctx => `${ctx.parsed.y.toFixed(2)}€`,
          }
        },
        annotation: p.target ? {
          annotations: {
            target: {
              type: 'line',
              yMin: p.target,
              yMax: p.target,
              borderColor: '#0070f3',
              borderWidth: 1,
              borderDash: [5, 5],
              label: {
                display: true,
                content: `Objetivo ${p.target}€`,
                color: '#0070f3',
                font: { family: 'DM Mono', size: 10 },
                position: 'end',
              }
            }
          }
        } : {},
      },
      scales: {
        x: {
          grid: { color: '#1e1e35' },
          ticks: { color: '#555', font: { family: 'DM Mono', size: 10 }, maxTicksLimit: 7 },
        },
        y: {
          grid: { color: '#1e1e35' },
          ticks: {
            color: '#555',
            font: { family: 'DM Mono', size: 10 },
            callback: v => v + '€',
          },
        }
      }
    }
  });
}

// ── INIT ──────────────────────────────────────
loadData();
setInterval(loadData, 5 * 60 * 1000); // Refresca cada 5 minutos
</script>
</body>
</html>
