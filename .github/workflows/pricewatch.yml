name: PriceWatch - Escaneo diario de precios

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Guardar resultados
        run: |
          git config --local user.email "pricewatch@github.com"
          git config --local user.name "PriceWatch Bot"
          git add precios.csv alertas.json || true
          git diff --staged --quiet || git commit -m "Actualizacion de precios - $(date '+%Y-%m-%d %H:%M')"
          git push || true
